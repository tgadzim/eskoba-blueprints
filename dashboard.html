<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Eskoba Blueprint LMS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div>
      <h1>Dashboard</h1>
      <div id="welcomeText">
        Loading profile...
      </div>

    <button
      onclick="logoutUser()"
      style="
        background:#ef4444;
        color:white;
        border:0;
        padding:12px 18px;
        border-radius:10px;
        cursor:pointer;
        font-weight:bold;
      ">
      Logout
    </button>
  </div>
</div>

<div class="container">

  <div class="card">
    <h2>Overall Progress</h2>

    <p id="overallProgressText">
      Loading progress...
    </p>

    <div style="
      background:#e5e7eb;
      height:12px;
      border-radius:999px;
      overflow:hidden;
      margin:14px 0;
    ">
      <div
        id="overallProgressBar"
        style="
          background:#2563eb;
          height:100%;
          width:0%;
        ">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Continue Learning</h2>

    <p>
      Meta Advertising / Andromeda2026
    </p>

    <a
      class="button"
      href="modules/meta-advertising-andromeda2026/index.html">
      Open Module
    </a>
  </div>

  <div class="card">
    <h2>Available Modules</h2>

    <ul>
      <li>Meta Advertising / Andromeda2026</li>
      <li>Product Marketing Direction — Coming Soon</li>
      <li>Business Diagnosis — Coming Soon</li>
    </ul>
  </div>

</div>

<script type="module" src="js/protect.js"></script>
<script type="module" src="js/dashboard.js"></script>

</body>
</html>

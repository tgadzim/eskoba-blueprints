<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Eskoba Blueprint LMS</title>
  <link rel="stylesheet" href="css/style.css?v=7">
</head>
<body>

<nav class="top-left-nav" aria-label="Account navigation">
  <a class="top-nav-button top-nav-button-active" href="dashboard.html">Dashboard</a>
  <a class="top-nav-button top-nav-button-admin" id="adminPanelBtn" href="admin.html" hidden>Admin Panel</a>
  <button class="top-nav-button top-nav-button-logout" id="logoutBtn" type="button">Logout</button>
</nav>

<div class="header">
  <div>
    <h1>Dashboard</h1>
    <div id="welcomeText">Loading profile...</div>
  </div>
</div>

<div class="container">

  <div class="card">
    <h2>Overall Progress</h2>
    <p id="overallProgressText">Loading progress...</p>

    <div style="background:#e5e7eb;height:12px;border-radius:999px;overflow:hidden;margin:14px 0;">
      <div id="overallProgressBar" style="background:#2563eb;height:100%;width:0%;"></div>
    </div>
  </div>

  <div class="card">
    <h2>Subscription</h2>
    <div class="subscription-summary" id="subscriptionSummary">Loading subscription...</div>
  </div>

  <div class="card">
    <h2>Continue Learning</h2>
    <div id="continueLearning">Loading modules...</div>
  </div>

  <div class="card">
    <h2>Available Modules</h2>
    <div id="availableModules">Loading modules...</div>
  </div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>

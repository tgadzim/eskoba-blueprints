        // HTML Slides Injector loop
        const slidesWrapper = document.getElementById('slides-wrapper');
        
        function compileSlidesHtml() {
            slidesWrapper.innerHTML = '';
            slideMetadata.forEach(slide => {
                const activeClass = slide.idx === currentSlide ? 'slide-active' : 'slide-hidden';
                const card = document.createElement('div');
                card.className = `slide-card absolute inset-0 bg-[#0F1626] flex flex-col justify-between ${activeClass}`;
                card.setAttribute('data-slide-index', slide.idx);
                card.innerHTML = renderSlideHtml(slide);
                slidesWrapper.appendChild(card);
            });
        }

        // DOM Controllers & Sidebar Navigation update
        const sidebarList = document.getElementById('sidebar-list');
        const slideProgressBadge = document.getElementById('slide-progress-badge');
        const slideNumIndicator = document.getElementById('slide-num-indicator');
        const slideProgressBar = document.getElementById('slide-progress-bar');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const autoplayBtn = document.getElementById('autoplay-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        function populateSidebar() {
            sidebarList.innerHTML = '';
            slideMetadata.forEach((slide) => {
                const item = document.createElement('button');
                item.className = `w-full text-left px-2 py-1.5 rounded-lg text-[11px] font-medium flex items-center gap-2.5 transition-all ${
                    slide.idx === currentSlide 
                    ? 'bg-eskobaRed/10 border border-eskobaRed/35 text-white shadow-md' 
                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-900/60'
                }`;
                item.onclick = () => selectSlide(slide.idx);
                
                // Index Indicator
                const numSpan = document.createElement('span');
                numSpan.className = `font-mono px-1 py-0.5 rounded text-[9px] ${
                    slide.idx === currentSlide ? 'bg-eskobaRed text-white font-bold' : 'bg-slate-800 text-slate-500'
                }`;
                numSpan.innerText = String(slide.idx).padStart(2, '0');
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'truncate font-space';
                titleSpan.innerText = slide.title;

                item.appendChild(numSpan);
                item.appendChild(titleSpan);
                sidebarList.appendChild(item);
            });
        }

        function selectSlide(index) {
            if (index < 1 || index > totalSlides) return;
            currentSlide = index;

            // Trigger slide card transitions
            const domSlides = document.querySelectorAll('.slide-card');
            domSlides.forEach((slide) => {
                const slideIdx = parseInt(slide.getAttribute('data-slide-index'));
                if (slideIdx === currentSlide) {
                    slide.classList.remove('slide-hidden');
                    slide.classList.add('slide-active');
                } else {
                    slide.classList.remove('slide-active');
                    slide.classList.add('slide-hidden');
                }
            });

            // Update UI widgets
            slideProgressBadge.innerText = `${currentSlide} / ${totalSlides}`;
            slideNumIndicator.innerText = `${String(currentSlide).padStart(2, '0')} // ${String(totalSlides).padStart(2, '0')}`;
            
            const progressPercentage = (currentSlide / totalSlides) * 100;
            slideProgressBar.style.width = `${progressPercentage}%`;

            populateSidebar();
        }

        function nextSlide() {
            if (currentSlide < totalSlides) {
                selectSlide(currentSlide + 1);
            } else {
                selectSlide(1); // loop back
            }
        }

        function prevSlide() {
            if (currentSlide > 1) {
                selectSlide(currentSlide - 1);
            } else {
                selectSlide(totalSlides); // loop back
            }
        }

        function toggleAutoplay() {
            if (autoplayInterval) {
                clearInterval(autoplayInterval);
                autoplayInterval = null;
                autoplayBtn.innerHTML = '<i class="fa-solid fa-play text-[10px]"></i> <span>Auto Play</span>';
                autoplayBtn.classList.remove('border-eskobaRed', 'text-white');
            } else {
                autoplayInterval = setInterval(nextSlide, 5000); // 5s auto shift
                autoplayBtn.innerHTML = '<i class="fa-solid fa-pause text-eskobaRed text-[10px]"></i> <span class="text-white font-bold">Playing</span>';
                autoplayBtn.classList.add('border-eskobaRed');
            }
        }

        function toggleFullscreen() {
            const container = document.querySelector('.slide-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch((err) => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
                fullscreenBtn.innerHTML = '<i class="fa-solid fa-compress text-sm"></i>';
            } else {
                document.exitFullscreen();
                fullscreenBtn.innerHTML = '<i class="fa-solid fa-expand text-sm"></i>';
            }
        }
